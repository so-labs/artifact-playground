<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Artifact Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/tools/20off.css">
    <link rel="stylesheet" href="css/tools/weight-over.css">
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('app-theme') || 'system';
                var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <header class="app-header">
        <div class="header-left">
            <button id="menu-toggle" class="menu-toggle" aria-label="メニューを開く">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <button id="sidebar-toggle" class="sidebar-toggle" aria-label="サイドバーを折りたたむ">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h1>Artifact Playground</h1>
        </div>
    </header>

    <div class="app-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-content">
                <nav>
                    <ul class="tool-list">
                        <li><a href="#20-off" class="tool-link active" data-tool="20-off">20% Off</a></li>
                        <li><a href="#weight-over" class="tool-link" data-tool="weight-over">ウエイトオーバー</a></li>
                    </ul>
                </nav>
            </div>
            <div class="sidebar-footer">
                <button id="theme-settings-btn" class="settings-btn" aria-label="テーマ設定">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" class="settings-icon">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
                <div id="theme-menu" class="theme-menu">
                    <ul>
                        <li><button class="theme-option" data-value="light">ライト</button></li>
                        <li><button class="theme-option" data-value="dark">ダーク</button></li>
                        <li><button class="theme-option" data-value="system">システム</button></li>
                    </ul>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <section id="tool-20-off" class="tool-section active">
                <h2>20% Off（テキストを削る）</h2>
                <div class="tool-ui">
                    <div class="input-group">
                        <div class="input-header">
                            <label for="input-text">入力テキスト</label>
                            <button id="btn-clear" class="btn small">クリア</button>
                        </div>
                        <textarea id="input-text" rows="8">吾輩は猫である。名前はまだ無い。
どこで生れたかとんと見当がつかぬ。
何でも薄暗いジメジメした所でニャーニャー泣いていた事だけは記憶している。</textarea>
                    </div>
                    <div class="settings-group">
                        <label for="percent-slider">削る割合: <span id="percent-display">20</span>%</label>
                        <input type="range" id="percent-slider" min="1" max="30" value="20" class="slider">
                    </div>
                    <div class="button-group">
                        <button id="btn-reduce" class="btn primary">20%削る</button>
                    </div>
                    <div class="output-group">
                        <div class="output-header">
                            <label for="output-text">出力結果</label>
                            <button id="btn-copy" class="btn small">コピー</button>
                        </div>
                        <textarea id="output-text" rows="8" readonly></textarea>
                    </div>
                </div>
            </section>

            <section id="tool-weight-over" class="tool-section">
                <h2>ウエイトオーバー（文字数制限）</h2>
                <div class="wo-layout">
                    <div class="wo-input-wrap">
                        <div class="input-header">
                            <label for="wo-input">入力テキスト</label>
                            <button id="wo-btn-clear" class="btn small">クリア</button>
                        </div>
                        <textarea id="wo-input" rows="12" placeholder="ここにテキストを入力..."></textarea>
                    </div>
                    <div class="wo-side">
                        <div class="wo-limit-group">
                            <label for="wo-limit">上限文字数</label>
                            <input type="number" id="wo-limit" min="1" max="50000" value="1000" class="wo-limit-input">
                            <div class="wo-quick-buttons">
                                <button type="button" class="btn small quick-limit-btn" data-limit="140"
                                    title="X (Twitter)">140</button>
                                <button type="button" class="btn small quick-limit-btn" data-limit="400"
                                    title="原稿用紙1枚">400</button>
                                <button type="button" class="btn small quick-limit-btn" data-limit="1000">1,000</button>
                                <button type="button" class="btn small quick-limit-btn" data-limit="2000">2,000</button>
                                <button type="button" class="btn small quick-limit-btn" data-limit="2200"
                                    title="Instagram / TikTok">2,200</button>
                                <button type="button" class="btn small quick-limit-btn" data-limit="3000">3,000</button>
                                <button type="button" class="btn small quick-limit-btn" data-limit="4000">4,000</button>
                                <button type="button" class="btn small quick-limit-btn"
                                    data-limit="10000">10,000</button>
                            </div>
                        </div>
                        <div class="wo-counter" id="wo-counter">
                            <div class="wo-count-number" id="wo-count">0</div>
                            <div class="wo-count-label">文字</div>
                            <div class="wo-limit-display">/ <span id="wo-limit-display">1000</span></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
