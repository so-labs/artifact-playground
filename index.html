<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Artifact Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/tools/20-off.css">
    <link rel="stylesheet" href="css/tools/weight-over.css">
    <link rel="stylesheet" href="css/tools/norinori-note.css">
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('app-theme') || 'system';
                var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                }

                // 描画前にサイドバーの折りたたみ状態を判定して適用（チラつき防止）
                var sidebarCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
                if (sidebarCollapsed && window.innerWidth > 768) {
                    document.documentElement.classList.add('sidebar-collapsed');
                }
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <header class="app-header">
        <div class="header-left">
            <button id="menu-toggle" class="menu-toggle" aria-label="メニューを開く">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <button id="sidebar-toggle" class="sidebar-toggle" aria-label="サイドバーを折りたたむ">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h1>Artifact Playground</h1>
        </div>
    </header>

    <div class="app-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-content">
                <nav>
                    <ul class="tool-list">
                        <li><a href="#20-off" class="tool-link" data-tool="20-off">20% Off</a></li>
                        <li><a href="#weight-over" class="tool-link" data-tool="weight-over">ウエイトオーバー</a></li>
                        <li><a href="#norinori-note" class="tool-link" data-tool="norinori-note">ノリノリ音符</a></li>
                    </ul>
                </nav>
            </div>
            <div class="sidebar-footer">
                <button id="theme-settings-btn" class="settings-btn" aria-label="テーマ設定">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" class="settings-icon">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
                <div id="theme-menu" class="theme-menu">
                    <ul>
                        <li><button class="theme-option" data-value="light">ライト</button></li>
                        <li><button class="theme-option" data-value="dark">ダーク</button></li>
                        <li><button class="theme-option" data-value="system">システム</button></li>
                    </ul>
                </div>
            </div>
        </aside>

        <main class="main-content" id="main-content">
            <!-- ツールが動的に読み込まれます -->
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
