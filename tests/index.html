<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact Playground - Test Runner</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="test.css">
    <meta name="theme-color" content="#f8fafc" id="theme-color-meta">
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('app-theme') || 'system';
                var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                var metaThemeColor = document.getElementById('theme-color-meta');
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    if (metaThemeColor) metaThemeColor.setAttribute('content', '#1e293b');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    if (metaThemeColor) metaThemeColor.setAttribute('content', '#f8fafc');
                }
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <a href="../" class="back-link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        アプリに戻る
    </a>
    <h1>🧪 Test Runner</h1>
    <div class="summary">
        <div>実施テスト: <span id="total-count">0</span></div>
        <div class="passed">成功: <span id="passed-count">0</span></div>
        <div class="failed">失敗: <span id="failed-count">0</span></div>
    </div>
    <div id="test-results"></div>

    <script type="module" src="test.js"></script>
</body>

</html>
