<section id="tool-20-off" class="tool-section">
    <h2>20% Off（テキストを削る）</h2>
    <div class="tool-ui">
        <div class="input-group">
            <div class="input-header">
                <label for="input-text">入力テキスト</label>
                <button id="btn-clear" class="btn small">クリア</button>
            </div>
            <textarea id="input-text" rows="8">吾輩は猫である。名前はまだ無い。
どこで生れたかとんと見当がつかぬ。
何でも薄暗いジメジメした所でニャーニャー泣いていた事だけは記憶している。</textarea>
        </div>
        <div class="settings-group">
            <label for="percent-slider">削る割合: <span id="percent-display">20</span>%</label>
            <input type="range" id="percent-slider" min="1" max="30" value="20" class="slider">
        </div>
        <div class="button-group">
            <button id="btn-reduce" class="btn primary">20%削る</button>
        </div>
        <div class="output-group">
            <div class="output-header">
                <label for="output-text">出力結果</label>
                <button id="btn-copy" class="btn small">コピー</button>
            </div>
            <textarea id="output-text" rows="8" readonly></textarea>
        </div>
    </div>
</section>
