<section id="tool-20-off" class="tool-section">
    <div class="tool-title-area">
        <h2>20% Off</h2>
        <button class="help-btn" aria-label="説明を表示" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        </button>
    </div>
    <div class="tool-description">
        入力されたテキストの各行から、指定された割合（％）の文字をランダムに削除します。文章を適度に削って要約やパズルを作成するなどの用途に利用できます。※各行の先頭の1文字は削除されません。
    </div>
    <div class="tool-ui">
        <div class="input-group">
            <div class="input-header">
                <label for="input-text">入力テキスト</label>
                <button id="btn-clear" class="btn small">クリア</button>
            </div>
            <textarea id="input-text" rows="8">吾輩は猫である。名前はまだ無い。
どこで生れたかとんと見当がつかぬ。
何でも薄暗いジメジメした所でニャーニャー泣いていた事だけは記憶している。</textarea>
        </div>
        <div class="settings-group">
            <label for="percent-slider">削る割合: <span id="percent-display">20</span>%</label>
            <input type="range" id="percent-slider" min="1" max="30" value="20" class="slider">
        </div>
        <div class="button-group">
            <button id="btn-reduce" class="btn primary">20%削る</button>
        </div>
        <div class="output-group">
            <div class="output-header">
                <label for="output-text">出力結果</label>
                <button id="btn-copy" class="btn small">コピー</button>
            </div>
            <textarea id="output-text" rows="8" readonly></textarea>
        </div>
    </div>
</section>
